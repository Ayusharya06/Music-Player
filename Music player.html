<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melodia Player</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e14;
    --card: #16161f;
    --card2: #1c1c28;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.1);
    --text: #e4e2f0;
    --muted: #6b6880;
    --accent: #a78bfa;
    --accent2: #60a5fa;
    --pink: #f472b6;
    --green: #34d399;
    --radius: 16px;
    --trans: 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(167,139,250,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(96,165,250,0.05) 0%, transparent 50%);
  }

  /* ── Layout ── */
  .player-wrap {
    display: flex;
    gap: 16px;
    max-width: 860px;
    width: 100%;
    align-items: flex-start;
  }

  /* ── Main Card ── */
  .main-card {
    flex: 1;
    background: var(--card);
    border-radius: 24px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 32px 64px rgba(0,0,0,0.5);
    min-width: 0;
  }

  /* Album Art */
  .art-section {
    position: relative;
    height: 280px;
    overflow: hidden;
    background: #111;
  }

  .art-bg {
    position: absolute;
    inset: -10px;
    background-size: cover;
    background-position: center;
    filter: blur(30px) brightness(0.4) saturate(1.5);
    transition: background-image 0.6s ease;
    transform: scale(1.1);
  }

  .art-img {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,-50%);
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.12);
    object-fit: cover;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    transition: transform var(--trans);
    animation: spin 20s linear infinite paused;
  }

  .art-img.spinning { animation-play-state: running; }

  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  .art-needle {
    position: absolute;
    right: 30px;
    top: 20px;
    width: 48px;
    transform-origin: 8px 8px;
    transform: rotate(-20deg);
    transition: transform 0.6s ease;
    opacity: 0.7;
  }
  .art-needle.playing { transform: rotate(10deg); }

  /* Song Info */
  .song-info {
    padding: 20px 24px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .song-texts { min-width: 0; }

  .song-title {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.01em;
  }

  .song-artist {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 400;
  }

  .song-genre {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(167,139,250,0.1);
    border: 1px solid rgba(167,139,250,0.2);
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Progress */
  .progress-section {
    padding: 6px 24px 0;
  }

  .progress-bar-wrap {
    position: relative;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    cursor: pointer;
    margin-bottom: 6px;
    transition: height 0.15s;
  }
  .progress-bar-wrap:hover { height: 6px; }

  .progress-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.15s linear;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(167,139,250,0.8);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .progress-bar-wrap:hover .progress-fill::after { opacity: 1; }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    padding: 12px 24px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    transition: color var(--trans), background var(--trans), transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    line-height: 1;
  }
  .ctrl-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  .ctrl-btn:active { transform: scale(0.9); }
  .ctrl-btn.active { color: var(--accent); }

  .btn-play {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(167,139,250,0.4);
    transition: transform var(--trans), box-shadow var(--trans);
    flex-shrink: 0;
  }
  .btn-play:hover { transform: scale(1.06); box-shadow: 0 6px 28px rgba(167,139,250,0.5); }
  .btn-play:active { transform: scale(0.95); }

  /* Volume */
  .volume-row {
    padding: 0 24px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .vol-icon { color: var(--muted); font-size: 0.9rem; cursor: pointer; transition: color 0.2s; flex-shrink: 0; }
  .vol-icon:hover { color: var(--text); }

  .vol-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .vol-slider:hover::-webkit-slider-thumb { transform: scale(1.3); }
  .vol-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    width: 28px;
    text-align: right;
  }

  /* Autoplay indicator */
  .autoplay-row {
    padding: 0 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .toggle-label {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .toggle-wrap { display: flex; align-items: center; gap: 8px; }
  .toggle {
    width: 34px; height: 18px;
    background: rgba(255,255,255,0.1);
    border-radius: 9px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
    border: none;
    outline: none;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: left 0.2s;
  }
  .toggle.on::after { left: 18px; }

  /* ── Playlist ── */
  .playlist-card {
    width: 240px;
    background: var(--card);
    border-radius: 24px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 32px 64px rgba(0,0,0,0.4);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    max-height: 580px;
  }

  .playlist-header {
    padding: 18px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .playlist-title {
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  .playlist-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent);
    background: rgba(167,139,250,0.1);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .playlist-list {
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.07) transparent;
  }

  .pl-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    position: relative;
  }
  .pl-item:hover { background: rgba(255,255,255,0.04); }
  .pl-item.active { background: rgba(167,139,250,0.08); }

  .pl-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }
  .pl-item.active .pl-num { color: var(--accent); }

  .pl-art {
    width: 36px; height: 36px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .pl-texts { min-width: 0; flex: 1; }
  .pl-song {
    font-size: 0.75rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .pl-item.active .pl-song { color: var(--accent); }
  .pl-artist { font-size: 0.62rem; color: var(--muted); margin-top: 1px; }
  .pl-dur {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* playing bars animation */
  .pl-bars {
    display: none;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
    flex-shrink: 0;
  }
  .pl-item.active.playing .pl-bars { display: flex; }
  .pl-item.active.playing .pl-num { display: none; }

  .pl-bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: bar-bounce 0.8s ease-in-out infinite;
  }
  .pl-bar:nth-child(2) { animation-delay: 0.15s; }
  .pl-bar:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bar-bounce {
    0%,100% { height: 4px; }
    50% { height: 14px; }
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .player-wrap { flex-direction: column; }
    .playlist-card { width: 100%; max-height: 220px; }
    .art-section { height: 220px; }
  }
</style>
</head>
<body>

<div class="player-wrap">

  <!-- Main Player -->
  <div class="main-card">
    <div class="art-section">
      <div class="art-bg" id="artBg"></div>
      <img class="art-img" id="artImg" src="" alt="Album Art">
      <!-- SVG Needle -->
      <svg class="art-needle" id="needle" viewBox="0 0 20 80" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="10" y1="10" x2="10" y2="65" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="10" cy="8" r="6" fill="#222" stroke="white" stroke-width="1.5"/>
        <circle cx="10" cy="8" r="2" fill="white"/>
        <circle cx="10" cy="66" r="4" fill="#666" stroke="white" stroke-width="1"/>
      </svg>
    </div>

    <div class="song-info">
      <div class="song-texts">
        <div class="song-title" id="songTitle">Loading...</div>
        <div class="song-artist" id="songArtist">Artist</div>
      </div>
      <div class="song-genre" id="songGenre">Genre</div>
    </div>

    <div class="progress-section">
      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="time-row">
        <span id="timeElapsed">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <div class="ctrl-group">
        <button class="ctrl-btn" id="btnShuffle" title="Shuffle">🔀</button>
        <button class="ctrl-btn" id="btnRepeat" title="Repeat">🔁</button>
      </div>
      <div class="ctrl-group">
        <button class="ctrl-btn" id="btnPrev" title="Previous" style="font-size:1.3rem">⏮</button>
        <button class="btn-play" id="btnPlay">▶</button>
        <button class="ctrl-btn" id="btnNext" title="Next" style="font-size:1.3rem">⏭</button>
      </div>
      <div class="ctrl-group" style="width:72px;justify-content:flex-end">
        <!-- spacer -->
      </div>
    </div>

    <div class="volume-row">
      <span class="vol-icon" id="volIcon">🔈</span>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="70">
      <span class="vol-label" id="volLabel">70</span>
    </div>

    <div class="autoplay-row">
      <span class="toggle-label">Autoplay next song</span>
      <div class="toggle-wrap">
        <button class="toggle on" id="autoplayToggle"></button>
        <span class="toggle-label" id="autoplayLabel" style="color:var(--accent)">ON</span>
      </div>
    </div>
  </div>

  <!-- Playlist -->
  <div class="playlist-card">
    <div class="playlist-header">
      <span class="playlist-title">Playlist</span>
      <span class="playlist-count" id="plCount">0 tracks</span>
    </div>
    <div class="playlist-list" id="playlistList"></div>
  </div>

</div>

<audio id="audioEl"></audio>

<script>
// ── Song Data (using reliable free audio samples) ──
const SONGS = [
  {
    title: 'Chill Afternoon',
    artist: 'Lo-Fi Collective',
    genre: 'Lo-Fi',
    src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
    art: 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=300',
    color: '#a78bfa'
  },
  {
    title: 'Ocean Drive',
    artist: 'Synthwave Studio',
    genre: 'Synthwave',
    src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',
    art: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=300',
    color: '#60a5fa'
  },
  {
    title: 'Midnight Jazz',
    artist: 'Blue Note Trio',
    genre: 'Jazz',
    src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3',
    art: 'https://images.unsplash.com/photo-1511192336575-5a79af67a629?w=300',
    color: '#f472b6'
  },
  {
    title: 'Forest Walk',
    artist: 'Ambient World',
    genre: 'Ambient',
    src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3',
    art: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=300',
    color: '#34d399'
  },
  {
    title: 'Urban Groove',
    artist: 'City Beats',
    genre: 'Hip-Hop',
    src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3',
    art: 'https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=300',
    color: '#fbbf24'
  },
  {
    title: 'Electric Dreams',
    artist: 'Neon Horizon',
    genre: 'Electronic',
    src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3',
    art: 'https://images.unsplash.com/photo-1574680096145-d05b474e2155?w=300',
    color: '#f87171'
  },
  {
    title: 'Golden Hour',
    artist: 'Indie Folk',
    genre: 'Folk',
    src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3',
    art: 'https://images.unsplash.com/photo-1506157786151-b8491531f063?w=300',
    color: '#fb923c'
  },
];

// ── State ──
let currentIdx = 0;
let isPlaying = false;
let isShuffle = false;
let isRepeat = false;
let isAutoplay = true;
let shuffleOrder = [];

const audio = document.getElementById('audioEl');

// Elements
const artBg     = document.getElementById('artBg');
const artImg    = document.getElementById('artImg');
const needle    = document.getElementById('needle');
const songTitle = document.getElementById('songTitle');
const songArtist= document.getElementById('songArtist');
const songGenre = document.getElementById('songGenre');
const progressFill = document.getElementById('progressFill');
const progressWrap = document.getElementById('progressWrap');
const timeElapsed  = document.getElementById('timeElapsed');
const timeDuration = document.getElementById('timeDuration');
const btnPlay   = document.getElementById('btnPlay');
const btnPrev   = document.getElementById('btnPrev');
const btnNext   = document.getElementById('btnNext');
const btnShuffle= document.getElementById('btnShuffle');
const btnRepeat = document.getElementById('btnRepeat');
const volSlider = document.getElementById('volSlider');
const volLabel  = document.getElementById('volLabel');
const volIcon   = document.getElementById('volIcon');
const autoplayToggle = document.getElementById('autoplayToggle');
const autoplayLabel  = document.getElementById('autoplayLabel');
const playlistList   = document.getElementById('playlistList');
const plCount        = document.getElementById('plCount');

// ── Load Song ──
function loadSong(idx, autoPlay = false) {
  const s = SONGS[idx];
  audio.src = s.src;
  audio.volume = volSlider.value / 100;
  artImg.src = s.art;
  artBg.style.backgroundImage = `url(${s.art})`;
  songTitle.textContent = s.title;
  songArtist.textContent = s.artist;
  songGenre.textContent = s.genre;
  progressFill.style.width = '0%';
  timeElapsed.textContent = '0:00';
  timeDuration.textContent = '0:00';
  updatePlaylistHighlight();
  if (autoPlay) play();
  else { isPlaying = false; updatePlayBtn(); }
}

function play() {
  audio.play().catch(() => {});
  isPlaying = true;
  updatePlayBtn();
  artImg.classList.add('spinning');
  needle.classList.add('playing');
  updatePlaylistHighlight();
}

function pause() {
  audio.pause();
  isPlaying = false;
  updatePlayBtn();
  artImg.classList.remove('spinning');
  needle.classList.remove('playing');
  updatePlaylistHighlight();
}

function updatePlayBtn() {
  btnPlay.textContent = isPlaying ? '⏸' : '▶';
}

function fmtTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

// ── Controls ──
btnPlay.addEventListener('click', () => isPlaying ? pause() : play());

btnPrev.addEventListener('click', () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  currentIdx = (currentIdx - 1 + SONGS.length) % SONGS.length;
  loadSong(currentIdx, isPlaying);
});

btnNext.addEventListener('click', () => nextSong(true));

function nextSong(forcePlay = false) {
  if (isRepeat) { audio.currentTime = 0; if (isPlaying || forcePlay) play(); return; }
  if (isShuffle) {
    let next;
    do { next = Math.floor(Math.random() * SONGS.length); } while (next === currentIdx && SONGS.length > 1);
    currentIdx = next;
  } else {
    currentIdx = (currentIdx + 1) % SONGS.length;
  }
  loadSong(currentIdx, isPlaying || forcePlay);
}

btnShuffle.addEventListener('click', () => {
  isShuffle = !isShuffle;
  btnShuffle.classList.toggle('active', isShuffle);
});

btnRepeat.addEventListener('click', () => {
  isRepeat = !isRepeat;
  btnRepeat.classList.toggle('active', isRepeat);
});

// ── Progress Bar ──
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  timeElapsed.textContent = fmtTime(audio.currentTime);
  timeDuration.textContent = fmtTime(audio.duration);
});

progressWrap.addEventListener('click', e => {
  const rect = progressWrap.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

// drag support
let dragging = false;
progressWrap.addEventListener('mousedown', () => dragging = true);
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = progressWrap.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = pct * audio.duration;
});
document.addEventListener('mouseup', () => dragging = false);

// ── Volume ──
volSlider.addEventListener('input', () => {
  audio.volume = volSlider.value / 100;
  volLabel.textContent = volSlider.value;
  volIcon.textContent = volSlider.value == 0 ? '🔇' : volSlider.value < 40 ? '🔈' : '🔊';
  // update slider gradient
  const pct = volSlider.value;
  volSlider.style.background = `linear-gradient(90deg, var(--accent) ${pct}%, rgba(255,255,255,0.08) ${pct}%)`;
});
// init gradient
volSlider.style.background = `linear-gradient(90deg, var(--accent) 70%, rgba(255,255,255,0.08) 70%)`;

volIcon.addEventListener('click', () => {
  if (audio.volume > 0) {
    volSlider._prev = volSlider.value;
    volSlider.value = 0;
  } else {
    volSlider.value = volSlider._prev || 70;
  }
  volSlider.dispatchEvent(new Event('input'));
});

// ── Autoplay ──
audio.addEventListener('ended', () => {
  if (isAutoplay) nextSong(true);
  else { isPlaying = false; updatePlayBtn(); artImg.classList.remove('spinning'); needle.classList.remove('playing'); }
});

autoplayToggle.addEventListener('click', () => {
  isAutoplay = !isAutoplay;
  autoplayToggle.classList.toggle('on', isAutoplay);
  autoplayLabel.textContent = isAutoplay ? 'ON' : 'OFF';
  autoplayLabel.style.color = isAutoplay ? 'var(--accent)' : 'var(--muted)';
});

// ── Playlist ──
function buildPlaylist() {
  playlistList.innerHTML = '';
  plCount.textContent = SONGS.length + ' tracks';
  SONGS.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'pl-item' + (i === currentIdx ? ' active' : '') + (i === currentIdx && isPlaying ? ' playing' : '');
    item.dataset.idx = i;
    item.innerHTML = `
      <div class="pl-bars">
        <div class="pl-bar"></div><div class="pl-bar"></div><div class="pl-bar"></div>
      </div>
      <span class="pl-num">${String(i+1).padStart(2,'0')}</span>
      <img class="pl-art" src="${s.art}" alt="">
      <div class="pl-texts">
        <div class="pl-song">${s.title}</div>
        <div class="pl-artist">${s.artist}</div>
      </div>
      <span class="pl-dur">—:——</span>
    `;
    item.addEventListener('click', () => {
      currentIdx = i;
      loadSong(i, true);
    });
    playlistList.appendChild(item);
  });
  // Load durations
  SONGS.forEach((s, i) => {
    const tmp = new Audio();
    tmp.src = s.src;
    tmp.addEventListener('loadedmetadata', () => {
      const el = playlistList.children[i];
      if (el) el.querySelector('.pl-dur').textContent = fmtTime(tmp.duration);
    });
  });
}

function updatePlaylistHighlight() {
  document.querySelectorAll('.pl-item').forEach((el, i) => {
    el.classList.toggle('active', i === currentIdx);
    el.classList.toggle('playing', i === currentIdx && isPlaying);
  });
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); isPlaying ? pause() : play(); }
  else if (e.code === 'ArrowRight') { e.preventDefault(); audio.currentTime = Math.min(audio.duration, audio.currentTime + 5); }
  else if (e.code === 'ArrowLeft')  { e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - 5); }
  else if (e.code === 'ArrowUp')    { e.preventDefault(); volSlider.value = Math.min(100, +volSlider.value + 5); volSlider.dispatchEvent(new Event('input')); }
  else if (e.code === 'ArrowDown')  { e.preventDefault(); volSlider.value = Math.max(0, +volSlider.value - 5); volSlider.dispatchEvent(new Event('input')); }
  else if (e.code === 'KeyN') nextSong(true);
  else if (e.code === 'KeyP') { currentIdx = (currentIdx - 1 + SONGS.length) % SONGS.length; loadSong(currentIdx, isPlaying); }
});

// ── Init ──
loadSong(0);
buildPlaylist();
</script>
</body>
</html>
